name: Build and publish builder VM image

# Rebuild builder image only when builder config changes on main.
on:
  push:
    branches: [main]
    paths:
      - 'nix/vm-builder.nix'
      - 'nix/vm-base.nix'
      - 'flake.lock'
      - '.github/workflows/builder-image.yml'

jobs:
  build-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build builder VM image
        run: |
          mkdir -p build/vm/tmp
          TMPDIR="$(pwd)/build/vm/tmp" nix-build nix/vm-builder.nix -o build/vm/builder-result

      - name: Compress and hash
        id: artifact
        run: |
          gzip -c build/vm/builder-result/nixos.img > umbravox-builder.img.gz
          sha256sum umbravox-builder.img.gz > umbravox-builder.img.gz.sha256
          HASH=$(cut -d' ' -f1 umbravox-builder.img.gz.sha256)
          SIZE=$(stat -c%s umbravox-builder.img.gz)
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Compute version
        id: version
        run: |
          echo "tag=builder-$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Builder VM Image (${{ steps.version.outputs.tag }})"
          body: |
            Minimal NixOS builder VM image for UmbraVOX.

            This image boots inside QEMU, downloads the dev toolchain from
            cache.nixos.org, and builds the full dev VM image natively.

            **SHA-256:** `${{ steps.artifact.outputs.sha256 }}`
            **Size:** ${{ steps.artifact.outputs.size }} bytes

            **Usage:** `./uv vm build-image` downloads this automatically.
          files: |
            umbravox-builder.img.gz
            umbravox-builder.img.gz.sha256
          draft: false
          prerelease: false
