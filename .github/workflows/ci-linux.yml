name: CI - Linux x86_64 (M3.1.1)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build and test (linux-hosted-fast)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install Nix
        uses: cachix/install-nix-action@d1ca2b820025855eb2a2c513a76a9a0d9e84a2a1  # v27
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/b3da656039dc7a6240f27b2ef8cc6a3ef3bccae7.tar.gz

      - name: Cabal update
        run: nix-shell --run "cabal update"

      - name: Build
        run: nix-shell --run "cabal build all --enable-tests"

      - name: Test (required fast gate)
        run: nix-shell --run "cabal test umbravox-test --test-options='required'"

  check:
    name: Quality gates (lint, format, license, complexity, generated-headers)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install Nix
        uses: cachix/install-nix-action@d1ca2b820025855eb2a2c513a76a9a0d9e84a2a1  # v27
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/b3da656039dc7a6240f27b2ef8cc6a3ef3bccae7.tar.gz

      # NOTE: These checks are intentionally inlined rather than delegated to
      # `./uv check`.  `./uv check` runs inside the NixOS VM (via QEMU), which
      # is not available in the GitHub Actions environment.  Any check that can
      # be executed on the host (lint, format, license, complexity,
      # generated-headers) is reproduced here so CI stays VM-free.  Keep this
      # list in sync with the gates defined in uv/check when adding new checks.

      - name: Lint (tabs, long lines)
        run: |
          nix-shell --run "
            failed=0
            for dir in src test; do
              if [ -d \"\$dir\" ]; then
                if grep -Prn '\t' --include='*.hs' -r \"\$dir\"; then
                  echo 'FAIL: tab characters found'
                  failed=1
                fi
                if grep -Pcn '.{121,}' --include='*.hs' -r \"\$dir\"; then
                  echo 'FAIL: lines > 120 chars found'
                  failed=1
                fi
              fi
            done
            exit \$failed
          "

      - name: Format (trailing whitespace)
        run: |
          nix-shell --run "
            failed=0
            for dir in src test; do
              if [ -d \"\$dir\" ]; then
                if grep -Pn '\s$' --include='*.hs' -r \"\$dir\"; then
                  echo 'FAIL: trailing whitespace found'
                  failed=1
                fi
              fi
            done
            exit \$failed
          "

      - name: License headers (SPDX)
        run: |
          nix-shell --run "
            failed=0
            for dir in src test; do
              if [ -d \"\$dir\" ]; then
                find \"\$dir\" -name '*.hs' -type f | while read -r f; do
                  if ! head -5 \"\$f\" | grep -q 'SPDX-License-Identifier'; then
                    echo \"FAIL: missing SPDX header: \$f\"
                    failed=1
                  fi
                done
              fi
            done
            exit \$failed
          "

      - name: Cabal update
        run: nix-shell --run "cabal update"

      - name: Build check-complexity
        run: nix-shell --run "cabal build check-complexity"

      - name: Complexity (max 8)
        run: nix-shell --run "cabal run check-complexity -- src/ test/ app/codegen/ 8"

      - name: Generated headers (Auto-generated by CryptoGen)
        run: |
          nix-shell --run "
            c_files=\$(find csrc/generated -maxdepth 1 -name '*.c' -type f | wc -l)
            if [ \"\$c_files\" -eq 0 ]; then
              echo 'SKIP: no generated .c files found'
              exit 0
            fi
            tagged=\$(head -1 csrc/generated/*.c | grep -c 'Auto-generated by CryptoGen' || true)
            if [ \"\$tagged\" -ne \"\$c_files\" ]; then
              echo \"FAIL: \$tagged of \$c_files generated .c files have the Auto-generated by CryptoGen header\"
              exit 1
            fi
            echo \"OK: all \$c_files generated .c files carry the Auto-generated by CryptoGen header\"
          "

  readiness:
    name: Lane readiness check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install Nix
        uses: cachix/install-nix-action@d1ca2b820025855eb2a2c513a76a9a0d9e84a2a1  # v27
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/b3da656039dc7a6240f27b2ef8cc6a3ef3bccae7.tar.gz

      - name: Linux x86_64 lane readiness
        run: nix-shell --run "bash scripts/release-lane-readiness-linux-x86_64.sh"
