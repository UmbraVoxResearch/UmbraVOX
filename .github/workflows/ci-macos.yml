name: CI - macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin: keep in sync with builder-image.yml and release.yml.
env:
  NIXPKGS_REV: b3da656039dc7a6240f27b2ef8cc6a3ef3bccae7

jobs:
  build-test:
    name: Build and test (native-macos)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install Nix
        uses: cachix/install-nix-action@d1ca2b820025855eb2a2c513a76a9a0d9e84a2a1  # v27
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/${{ env.NIXPKGS_REV }}.tar.gz

      # macOS runners have no KVM, so ./uv (which boots a QEMU VM) cannot
      # run.  Use cabal directly inside nix-shell instead.

      - name: Cabal update
        run: nix-shell --run "cabal update"

      - name: Build
        run: nix-shell --run "cabal build all --enable-tests"

      - name: Test (required fast gate)
        run: nix-shell --run "cabal test umbravox-test --test-options='required'"

  readiness:
    name: Lane readiness check
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install Nix
        uses: cachix/install-nix-action@d1ca2b820025855eb2a2c513a76a9a0d9e84a2a1  # v27
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/${{ env.NIXPKGS_REV }}.tar.gz

      - name: macOS lane readiness
        run: nix-shell --run "bash scripts/release-lane-readiness-macos.sh"
        # Readiness check is informational on macOS; do not block CI.
        continue-on-error: true
