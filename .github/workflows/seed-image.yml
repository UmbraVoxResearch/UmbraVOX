name: Build and publish seed VM image

# Rebuild seed image only when seed-related files change on main.
# The seed image only needs updating when nix/vm-seed.nix, nix/vm-base.nix,
# or flake.lock change — not on every release.
on:
  push:
    branches: [main]
    paths:
      - 'nix/vm-seed.nix'
      - 'nix/vm-base.nix'
      - 'flake.lock'
      - '.github/workflows/seed-image.yml'

jobs:
  build-seed:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for creating releases
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build seed VM image
        run: |
          mkdir -p build/vm/tmp
          rm -rf build/vm/seed-image
          TMPDIR="$(pwd)/build/vm/tmp" nix-build nix/vm-seed.nix -o build/vm/seed-image

      - name: Compute SHA-256
        id: hash
        run: |
          HASH=$(sha256sum build/vm/seed-image/nixos.img | cut -d' ' -f1)
          SIZE=$(stat -c%s build/vm/seed-image/nixos.img)
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "Seed image SHA-256: $HASH"
          echo "Seed image size: $SIZE bytes"

      - name: Update pinned hash and version in scripts/vm-image-builder.sh
        run: |
          HASH=${{ steps.hash.outputs.sha256 }}
          SEED_VER=${{ steps.version.outputs.seed_version }}
          sed -i "s/^SEED_SHA256=.*/SEED_SHA256=\"${HASH}\"/" scripts/vm-image-builder.sh
          sed -i "s/^SEED_VERSION=.*/SEED_VERSION=\"${SEED_VER}\"/" scripts/vm-image-builder.sh
          echo "Updated SEED_SHA256=$HASH SEED_VERSION=$SEED_VER"

      - name: Commit hash update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/vm-image-builder.sh
          git diff --cached --quiet || git commit -m "auto: update seed SHA-256 and version to ${{ steps.version.outputs.seed_version }}"
          git push origin main

      - name: Compress seed image
        run: |
          gzip -c build/vm/seed-image/nixos.img > umbravox-seed.img.gz
          sha256sum umbravox-seed.img.gz > umbravox-seed.img.gz.sha256

      - name: Compute seed version
        id: version
        run: |
          # Seed version is date-based (YYYY.MM.DD) since it only rebuilds on config changes
          SEED_VER="$(date +%Y.%m.%d)"
          COMMIT_SHORT="$(git rev-parse --short HEAD)"
          echo "seed_version=$SEED_VER" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"

      - name: Create seed release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: seed-${{ steps.version.outputs.seed_version }}
          name: "Seed VM Image (${{ steps.version.outputs.tag }})"
          body: |
            Minimal NixOS seed VM image for UmbraVOX builder bootstrap.

            This image contains only the Nix daemon and basic utilities.
            It boots inside QEMU, downloads the full toolchain, and builds
            the dev VM image — all without touching the host /nix/store.

            **SHA-256 (uncompressed):** `${{ steps.hash.outputs.sha256 }}`
            **Size (uncompressed):** ${{ steps.hash.outputs.size }} bytes

            **Usage:** `make vm-image-build` downloads this automatically.
            Override URL: `UMBRAVOX_SEED_URL=<url> make vm-image-build`
          files: |
            umbravox-seed.img.gz
            umbravox-seed.img.gz.sha256
          draft: false
          prerelease: false
