# UmbraVOX VM Network Policy
# ===========================
# This file controls network access for development VMs.
# It is read by the host-side orchestration BEFORE launching QEMU.
# The VM cannot modify this file — it lives on the host filesystem.
#
# SECURITY: If a prompt injection or malicious code takes control of
# the VM, it cannot reach anything not explicitly allowed here.
# Default policy: DENY ALL. Only explicitly listed destinations are reachable.
#
# Format: one rule per line
#   ALLOW <protocol> <destination> <port>
#   DENY ALL                          (default, implicit)
#
# Protocol: tcp, udp, icmp, any
# Destination: domain name, IP address, or CIDR range
# Port: number, range (1000-2000), or * (all)
#
# Lines starting with # are comments. Blank lines are ignored.

# === DEFAULT POLICY ===
# All traffic is denied unless explicitly allowed below.
# The VM has no default gateway and no DNS unless configured here.

# === DEVELOPMENT (currently: no network needed) ===
# UmbraVOX builds offline. All packages are baked into the VM image.
# No network access is required for build, test, or verify.

# === FUTURE: Package updates (uncomment when needed) ===
# ALLOW tcp cache.nixos.org 443
# ALLOW tcp hackage.haskell.org 443

# === FUTURE: Git operations (uncomment when needed) ===
# ALLOW tcp github.com 22
# ALLOW tcp github.com 443

# === LOOPBACK (always allowed inside VM) ===
# 127.0.0.0/8 is always available inside the VM for loopback tests.
# This does not need a rule here — it's internal to the guest.

# === VM TYPE OVERRIDES ===
# Different VM purposes may need different network access.
# Set UMBRAVOX_VM_TYPE=<type> to select a policy section.
# Default (no type set): deny all.
#
# [type:integration-test]
# Multi-VM integration tests need inter-VM communication on test LANs.
# These VMs use TAP+bridge networking (scripts/vm-network-setup.sh).
# ALLOW any 10.0.42.0/24 *
# ALLOW any 10.0.43.0/24 *
#
# [type:socks5-test]
# SOCKS5 transport testing needs loopback proxy access.
# (Loopback is always available — no rule needed.)
#
# [type:smoke]
# Release smoke testing runs offline. No network needed.
# (Same as default deny-all.)
