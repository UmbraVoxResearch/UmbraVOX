shortCode:
  baseUrl: https://example.com/shortcodes/

linkDevice:
  secret: secret://linkDevice.secret

# ---------------------------------------------------------------------------
# TURN / Cloudflare
# ---------------------------------------------------------------------------
turn:
  cloudflare:
    apiToken: secret://turn.cloudflare.apiToken
    endpoint: https://rtc.live.cloudflare.com/v1/turn/keys/LMNOP/credentials/generate
    requestedCredentialTtl: PT24H
    clientCredentialTtl: PT12H
    urls:
      - "turn:turn.example.com:80"
    urlsWithIps:
      - "turn:%s"
      - "turn:%s:80?transport=tcp"
      - "turns:%s:443?transport=tcp"
    hostname: turn.cloudflare.example.com
    numHttpClients: 1

# ---------------------------------------------------------------------------
# Attachments / CDN
# ---------------------------------------------------------------------------
attachments:
  maxAttachmentUploadSizeInBytes: 1048576
  maxMessageBackupUploadSizeInBytes: 1048576

gcpAttachments:
  domain: example.com
  email: user@example.com
  pathPrefix: ""
  rsaSigningKey: secret://gcpAttachments.rsaSigningKey

cdn:
  bucket: cdn-test
  credentials:
    accessKeyId: secret://cdn.accessKey
    secretAccessKey: secret://cdn.accessSecret
  region: us-west-2

cdn3StorageManager:
  baseUri: https://storage-manager.example.com
  clientId: example
  clientSecret: secret://cdn3StorageManager.clientSecret
  sourceSchemes:
    2: gcs
    3: r2

# ---------------------------------------------------------------------------
# Payment processors (stubs)
# ---------------------------------------------------------------------------
stripe:
  apiKey: secret://stripe.apiKey
  idempotencyKeyGenerator: secret://stripe.idempotencyKeyGenerator
  boostDescription: "UmbraVOX Test"
  supportedCurrenciesByPaymentMethod:
    CARD:
      - usd

braintree:
  merchantId: unset
  publicKey: secret://braintree.publicKey
  privateKey: secret://braintree.privateKey
  environment: sandbox
  graphqlUrl: unset
  merchantAccounts:
    'xts': unset
  supportedCurrenciesByPaymentMethod:
    PAYPAL:
      - usd
  pubSubPublisher:
    type: stub

googlePlayBilling:
  credentialsJson: |
    {
      "type": "external_account",
      "credential_source": { "file": "/tmp/dummy-token" },
      "subject_token_type": "urn:ietf:params:oauth:token-type:jwt",
      "audience": "//iam.googleapis.com/dummy",
      "token_url": "https://sts.googleapis.com/v1/token"
    }
  packageName: com.example.umbravox
  applicationName: test
  productIdToLevel: {}

appleAppStore:
  env: LOCAL_TESTING
  bundleId: com.example.umbravox
  appAppleId: 12345
  issuerId: dummy-issuer
  keyId: dummy-key
  encodedKey: secret://appleAppStore.encodedKey
  subscriptionGroupId: dummy_subscriptionGroupId
  productIdToLevel: {}
  appleRootCerts: []

appleDeviceCheck:
  keyId: dummy-key
  teamId: dummy-team
  signingKey: secret://apn.signingKey

deviceCheck: {}

# ---------------------------------------------------------------------------
# Badges / subscriptions (minimal)
# ---------------------------------------------------------------------------
badges:
  badges:
    - id: TEST
      category: other
      sprites:
        - sprite-1.png
        - sprite-2.png
        - sprite-3.png
        - sprite-4.png
        - sprite-5.png
        - sprite-6.png
      svg: example.svg
      svgs:
        - light: example-light.svg
          dark: example-dark.svg
  badgeIdsEnabledForAll:
    - TEST
  receiptLevels:
    '1': TEST

subscription:
  badgeExpiration: P30D
  badgeGracePeriod: P15D
  backupExpiration: P30D
  backupGracePeriod: P15D
  backupFreeTierMediaDuration: P30D
  backupLevels:
    201:
      playProductId: EXAMPLE
      mediaTtl: P30D
      prices: {}
  levels:
    500:
      badge: TEST
      prices:
        xts:
          amount: '10'
          processorIds:
            STRIPE: price_example
            BRAINTREE: plan_example

oneTimeDonations:
  sepaMaximumEuros: '10000'
  boost:
    level: 1
    expiration: P90D
    badge: TEST
  gift:
    level: 10
    expiration: P90D
    badge: TEST
  currencies:
    xts:
      minimum: '0.5'
      gift: '2'
      boosts:
        - '1'
        - '2'
        - '4'
        - '8'
        - '20'
        - '40'

