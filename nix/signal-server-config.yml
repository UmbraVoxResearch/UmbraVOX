# Signal-Server configuration for UmbraVOX wire-compatibility testing.
#
# This is a MINIMAL configuration based on Signal-Server's test.yml.
# It runs entirely locally with no external service dependencies.
#
# Dropwizard entry point:
#   org.whispersystems.textsecuregcm.WhisperServerService server config.yml
#
# Secrets are injected via -Dsecrets.bundle.filename=secrets.yml
# and referenced here as secret://key.path

# ---------------------------------------------------------------------------
# Dropwizard server
# ---------------------------------------------------------------------------
logging:
  level: INFO
  appenders:
    - type: console
      threshold: ALL
      timeZone: UTC
      target: stdout

health:
  delayedShutdownHandlerEnabled: false

server:
  allowedMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - HEAD
    - OPTIONS
    - PATCH
    - CONNECT
  applicationConnectors:
    - type: h2c
      port: 8080
      useForwardedHeaders: true
  adminConnectors:
    - type: http
      port: 8081

# ---------------------------------------------------------------------------
# gRPC (used by newer Signal clients)
# ---------------------------------------------------------------------------
grpc:
  port: 50051
  websocketPort: 8080
  h2c: true

# ---------------------------------------------------------------------------
# WebSocket
# ---------------------------------------------------------------------------
webSocket: {}

# ---------------------------------------------------------------------------
# AWS credentials (dummy — DynamoDB-local doesn't check)
# ---------------------------------------------------------------------------
awsCredentialsProvider:
  type: static
  accessKeyId: secret://aws.accessKeyId
  secretAccessKey: secret://aws.secretAccessKey

tlsKeyStore:
  password: secret://tlsKeyStore.password

# ---------------------------------------------------------------------------
# DynamoDB (local mode — connects to DynamoDB-local on port 8000)
# ---------------------------------------------------------------------------
dynamoDbClient:
  type: local

dynamoDbTables:
  accounts:
    tableName: accounts_test
    phoneNumberTableName: numbers_test
    phoneNumberIdentifierTableName: pni_assignment_test
    usernamesTableName: usernames_test
    usedLinkDeviceTokensTableName: used_link_device_tokens_test
  appleDeviceChecks:
    tableName: apple_device_checks_test
  appleDeviceCheckPublicKeys:
    tableName: apple_device_check_public_keys_test
  backups:
    tableName: backups_test
  changeNumberWaitingPeriods:
    tableName: change_number_waiting_periods_test
  clientReleases:
    tableName: client_releases_test
  deletedAccounts:
    tableName: deleted_accounts_test
  deletedAccountsLock:
    tableName: deleted_accounts_lock_test
  issuedReceipts:
    tableName: issued_receipts_test
  ecKeys:
    tableName: keys_test
  ecSignedPreKeys:
    tableName: repeated_use_signed_ec_pre_keys_test
  pagedPqKeys:
    tableName: paged_pq_keys_test
  pqLastResortKeys:
    tableName: repeated_use_signed_kem_pre_keys_test
  messages:
    tableName: messages_test
  onetimeDonations:
    tableName: onetime_donations_test
  phoneNumberIdentifiers:
    tableName: pni_test
  profiles:
    tableName: profiles_test
  profilesV2:
    tableName: profilesV2_test
  pushChallenge:
    tableName: push_challenge_test
  pushNotificationExperimentSamples:
    tableName: push_notification_experiment_samples_test
  redeemedReceipts:
    tableName: redeemed_receipts_test
  registrationRecovery:
    tableName: registration_recovery_passwords_test
  remoteConfig:
    tableName: remote_config_test
  reportMessage:
    tableName: report_messages_test
  scheduledJobs:
    tableName: scheduled_jobs_test
  subscriptions:
    tableName: subscriptions_test
  verificationSessions:
    tableName: verification_sessions_test

# ---------------------------------------------------------------------------
# Redis / caching (local mode — uses embedded or connects to localhost:6379)
# ---------------------------------------------------------------------------
cacheCluster:
  type: local

pubsub:
  type: local

pushSchedulerCluster:
  type: local

rateLimitersCluster:
  type: local

messageCache:
  persistDelayMinutes: 1
  cluster:
    type: local

# ---------------------------------------------------------------------------
# Push notifications (stubs — not needed for wire-compat testing)
# ---------------------------------------------------------------------------
fcm:
  credentials: secret://fcm.credentials

apn:
  sandbox: true
  bundleId: com.example.umbravox.test
  keyId: secret://apn.keyId
  teamId: secret://apn.teamId
  signingKey: secret://apn.signingKey

