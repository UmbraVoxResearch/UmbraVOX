remoteConfig:
  globalConfig:
    EXAMPLE_KEY: VALUE

dynamicConfig:
  type: static
  object: |
    captcha:
      scoreFloor: 1.0
    grpcAllowList:
      enableAll: true

# ---------------------------------------------------------------------------
